name: Build and deploy Jekyll site to Pages

on:
  pull_request: {}
  push:
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      site: ${{ steps.filter.outputs.site }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            site:
              - '_posts/**'
              - '_layouts/**'
              - '_includes/**'
              - '_sass/**'
              - 'css/**'
              - 'assets/**'
              - '**/*.html'
              - '**/*.md'
              - '_config.yml'
              - 'Gemfile'
              - 'Gemfile.lock'

  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74
        with:
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Run Jekyll doctor
        run: bundle exec jekyll doctor
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Check generated HTML links
        run: bash scripts/run-htmlproofer.sh --disable-external ./_site
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v5

  test:
    runs-on: ubuntu-latest
    needs: [build, changes]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: github-pages
          path: _site/
      - name: Extract site from artifact
        run: tar -xvf _site/artifact.tar --directory=_site/
      - uses: actions/setup-node@v6
        with:
          node-version: "latest"
      - name: Detect system Chrome for Percy
        if: needs.changes.outputs.site == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          if command -v google-chrome >/dev/null 2>&1; then
            echo "PERCY_BROWSER_EXECUTABLE=$(command -v google-chrome)" >> "$GITHUB_ENV"
          fi
      - name: Generate snapshots
        if: needs.changes.outputs.site == 'true' || github.event_name == 'workflow_dispatch'
        timeout-minutes: 15
        run: |
          set -o pipefail
          npx --yes @percy/cli snapshot _site/ 2>&1 | tee percy.log
          if grep -q "Build not created" percy.log; then
            echo "Percy reported: Build not created"
            exit 1
          fi
        env:
          PERCY_EXIT_WITH_ZERO_ON_ERROR: false
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
      - name: Set snapshot-skipped status
        if: needs.changes.outputs.site != 'true' && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v9
        with:
          script: |
            const commitSha = context.payload.pull_request?.head?.sha ?? context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: commitSha,
              state: 'success',
              context: 'snapshot-skipped',
              description: 'Percy snapshots skipped — no site files changed'
            });

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
