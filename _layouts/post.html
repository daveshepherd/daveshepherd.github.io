---
layout: default
---
<div class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%-d %B %Y" }}{% if page.author %} • {{ page.author }}{% endif %}{% if page.meta %} • {{ page.meta }}{% endif %}</p>
  </header>

  <article class="post-content">
  {% if page.image %}<img class="post-image" src="{{ site.baseurl }}/assets/{{ page.image }}" alt="{{ page.image_alt | default: page.title | escape }}" loading="lazy" />{% endif %}
    
    {{ content }}
  </article>

</div>
